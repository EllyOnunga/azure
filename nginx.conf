# Azure Bay - Nginx Pretty URL Configuration snippet
# You can include this in your server { } block

# 1. 301 Redirects from old .html URLs
rewrite ^/about\.html$ /about/ permanent;
rewrite ^/menu\.html$ /menu/ permanent;
rewrite ^/order\.html$ /order/ permanent;
rewrite ^/contact\.html$ /contact/ permanent;
rewrite ^/reserve-table\.html$ /reserve/ permanent;
rewrite ^/image-gallery\.html$ /gallery/ permanent;
rewrite ^/video-gallery\.html$ /gallery/video/ permanent;
rewrite ^/team\.html$ /team/ permanent;
rewrite ^/testimonials\.html$ /testimonials/ permanent;
rewrite ^/donation\.html$ /donate/ permanent;
rewrite ^/faqs\.html$ /faqs/ permanent;
rewrite ^/privacy\.html$ /privacy/ permanent;
rewrite ^/terms\.html$ /terms/ permanent;
rewrite ^/blog\.html$ /blog/ permanent;
rewrite ^/blog-ocean-sustainable\.html$ /blog/ocean-sustainable/ permanent;
rewrite ^/blog-chef-story\.html$ /blog/chef-story/ permanent;
rewrite ^/blog-fish-plate\.html$ /blog/fish-plate/ permanent;
rewrite ^/blog-grilling-techniques\.html$ /blog/grilling-techniques/ permanent;
rewrite ^/blog-beach-getaway\.html$ /blog/beach-getaway/ permanent;
rewrite ^/blog-swahili-spices\.html$ /blog/swahili-spices/ permanent;
rewrite ^/team-single\.html$ /team/ permanent;

# 2. Canonical Trailing Slash Enforcement
# If the request doesn't have a dot (not a file) and doesn't end in a slash, redirect
if ($request_uri !~* "\.") {
    rewrite ^([^.]*[^/])$ $1/ permanent;
}

# 3. Main Location Block
location / {
    index index.html;
    try_files $uri $uri/ =404;
}
